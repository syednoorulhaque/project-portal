<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Department Project Submission Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .hide { display: none; }
        .custom-shadow { box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.1), 0 4px 15px -5px rgba(0, 0, 0, 0.05); }
        .autocomplete-items {
            position: absolute; border: 1px solid #d4d4d4; border-bottom: none; border-top: none; z-index: 99;
            top: 100%; left: 0; right: 0; background-color: #fff; border-radius: 0 0 10px 10px; overflow: hidden;
        }
        .autocomplete-items div { padding: 10px; cursor: pointer; border-bottom: 1px solid #d4d4d4; font-size: 13px; }
        .autocomplete-items div:hover { background-color: #e9e9e9; }
    </style>
</head>
<body class="bg-[#F9FAFB] text-slate-900 min-h-screen">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 h-24 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="bg-slate-900 p-3 rounded shadow-lg">
                    <i class="fas fa-graduation-cap text-white text-xl"></i>
                </div>
                <div>
                    <span class="font-extrabold text-lg block leading-none text-slate-800 tracking-tight uppercase">Department Portal</span>
                    <span class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mt-1 block">Advanced Submission System</span>
                </div>
            </div>
            <div class="flex bg-slate-100 p-1.5 rounded-lg border border-slate-200">
                <button id="nav-submit" class="px-6 py-2.5 rounded-lg text-[10px] font-black uppercase tracking-widest bg-white shadow-sm text-blue-700 transition-all">Submission</button>
                <button id="nav-admin" class="px-6 py-2.5 rounded-lg text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-slate-800 transition-all">Dashboard</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto py-12 px-6">
        
        <div id="view-submit" class="max-w-3xl mx-auto">
            <div class="bg-white rounded-2xl border border-slate-200 custom-shadow overflow-hidden">
                <div class="bg-slate-50 border-b border-slate-200 p-10 text-center">
                    <h1 class="text-3xl font-black text-slate-800 tracking-tight">Final Submission</h1>
                    <p class="text-slate-500 text-sm mt-2">Enter your Roll Number to auto-fill details.</p>
                </div>
                
                <form id="submission-form" class="p-8 md:p-12 space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-2 relative">
                            <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1">ID / Roll Number *</label>
                            <input required type="text" id="rollNo" placeholder="Start typing Roll No..." class="w-full px-5 py-4 bg-white border border-slate-300 rounded-xl focus:border-blue-600 focus:ring-4 focus:ring-blue-600/5 outline-none font-semibold transition-all" />
                            <div id="autocomplete-list" class="autocomplete-items hide"></div>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1">Candidate Name(s) *</label>
                            <input required type="text" id="studentName" placeholder="Full Name" class="w-full px-5 py-4 bg-white border border-slate-300 rounded-xl focus:border-blue-600 focus:ring-4 focus:ring-blue-600/5 outline-none font-semibold transition-all" />
                        </div>
                    </div>

                    <div class="space-y-2">
                        <div class="flex justify-between px-1">
                            <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest">Project Title *</label>
                            <span id="title-status" class="text-[10px] font-bold uppercase"></span>
                        </div>
                        <input required type="text" id="projectName" placeholder="Enter unique project title" class="w-full px-5 py-4 bg-white border border-slate-300 rounded-xl focus:border-blue-600 focus:ring-4 focus:ring-blue-600/5 outline-none font-semibold transition-all" />
                    </div>

                    <div class="space-y-2">
                        <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1">GitHub Link (Public)</label>
                        <input type="url" id="githubLink" placeholder="https://github.com/..." class="w-full px-5 py-4 bg-white border border-slate-300 rounded-xl outline-none font-semibold transition-all" />
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <label class="flex flex-col items-center p-6 border-2 border-dashed rounded-2xl cursor-pointer hover:bg-blue-50 transition-all border-slate-200 group" id="label-ppt">
                            <input type="file" id="file-ppt" class="hide" />
                            <i class="fas fa-file-powerpoint text-slate-300 text-3xl mb-3 group-hover:text-blue-500"></i>
                            <span class="text-[10px] font-black uppercase text-slate-500">Project PPT</span>
                        </label>
                        <label class="flex flex-col items-center p-6 border-2 border-dashed rounded-2xl cursor-pointer hover:bg-blue-50 transition-all border-slate-200 group" id="label-report">
                            <input type="file" id="file-report" class="hide" />
                            <i class="fas fa-file-pdf text-slate-300 text-3xl mb-3 group-hover:text-blue-500"></i>
                            <span class="text-[10px] font-black uppercase text-slate-500">Project PDF</span>
                        </label>
                        <label class="flex flex-col items-center p-6 border-2 border-dashed rounded-2xl cursor-pointer hover:bg-blue-50 transition-all border-slate-200 group" id="label-code">
                            <input type="file" id="file-code" class="hide" />
                            <i class="fas fa-file-code text-slate-300 text-3xl mb-3 group-hover:text-blue-500"></i>
                            <span class="text-[10px] font-black uppercase text-slate-500">Code ZIP</span>
                        </label>
                    </div>

                    <button type="submit" id="btn-submit" class="w-full bg-slate-900 hover:bg-black text-white font-black py-5 rounded-2xl shadow-xl uppercase tracking-[0.2em] text-xs transition-all active:scale-95">
                        Start Upload
                    </button>
                    <div id="upload-progress" class="hide w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                        <div id="progress-bar" class="bg-blue-600 h-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Dashboard and Login remain similar but updated for new storage -->
        <div id="view-success" class="hide max-w-md mx-auto text-center py-20">
            <div class="bg-white p-12 rounded-3xl shadow-2xl border border-slate-200">
                <i class="fas fa-check-circle text-emerald-500 text-6xl mb-6"></i>
                <h2 class="text-2xl font-black">Success!</h2>
                <button onclick="window.location.reload()" class="w-full mt-8 bg-slate-900 text-white py-4 rounded-xl font-bold uppercase text-xs tracking-widest">Back</button>
            </div>
        </div>

        <div id="view-login" class="hide max-w-md mx-auto py-20">
            <div class="bg-white p-10 rounded-3xl border border-slate-200 shadow-2xl text-center">
                <i class="fas fa-shield-alt text-slate-300 text-4xl mb-6"></i>
                <h2 class="text-xl font-bold">Faculty Access</h2>
                <form id="login-form" class="mt-8 space-y-4">
                    <input required type="password" id="admin-pass" placeholder="Authorization Key" class="w-full px-6 py-5 bg-slate-50 border border-slate-200 rounded-2xl text-center font-bold tracking-widest outline-none" />
                    <button type="submit" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl text-xs uppercase tracking-widest">Unlock Dashboard</button>
                </form>
            </div>
        </div>

        <div id="view-dashboard" class="hide space-y-10">
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
                <div>
                    <h2 class="text-4xl font-black text-slate-900 tracking-tight">Project Records</h2>
                    <p id="counter" class="text-slate-500 font-bold text-[10px] uppercase tracking-[0.2em] mt-2">Loading...</p>
                </div>
                <button id="btn-export" class="px-8 py-4 bg-emerald-600 text-white rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-emerald-700 transition-all shadow-xl">Export CSV</button>
            </div>

            <div class="bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm min-w-[1000px]">
                        <thead class="bg-slate-50 border-b border-slate-200 text-[11px] font-black uppercase text-slate-500 tracking-[0.2em]">
                            <tr>
                                <th class="px-10 py-6">Identity</th>
                                <th class="px-10 py-6">Project Title</th>
                                <th class="px-10 py-6 text-center">Files</th>
                                <th class="px-10 py-6 text-right">Filed On</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, getDocs, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        // CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyANQnFD0CZP4WNxIBdrU-f7FEZ2Dzeau7o",
            authDomain: "minor-project-cc578.firebaseapp.com",
            projectId: "minor-project-cc578",
            storageBucket: "minor-project-cc578.firebasestorage.app",
            messagingSenderId: "33910606520",
            appId: "1:33910606520:web:cb37ba9929bb534e34c24d"
        };

        // EDIT STUDENT LIST HERE
        const STUDENT_LIST = [
            { roll: "21BCE102", name: "Rahul Kumar" },
            { roll: "21BCE105", name: "Sneha Sharma" },
            { roll: "21BCE110", name: "Amit Singh" },
            { roll: "21BCE115", name: "Priya Patel" }
        ];

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const storage = getStorage(app);
        const ADMIN_PASS = "admin123";
        let submissions = [];

        // Autocomplete Logic
        const rollInput = document.getElementById('rollNo');
        const nameInput = document.getElementById('studentName');
        const listDiv = document.getElementById('autocomplete-list');

        rollInput.oninput = function() {
            const val = this.value;
            listDiv.innerHTML = "";
            if (!val) { listDiv.classList.add('hide'); return; }
            
            const matches = STUDENT_LIST.filter(s => s.roll.toLowerCase().startsWith(val.toLowerCase()));
            if (matches.length > 0) {
                listDiv.classList.remove('hide');
                matches.forEach(m => {
                    const item = document.createElement("div");
                    item.innerHTML = `<strong>${m.roll}</strong> - ${m.name}`;
                    item.onclick = () => {
                        rollInput.value = m.roll;
                        nameInput.value = m.name;
                        listDiv.classList.add('hide');
                    };
                    listDiv.appendChild(item);
                });
            } else {
                listDiv.classList.add('hide');
            }
        };

        // Views and Navigation
        const views = { submit: document.getElementById('view-submit'), success: document.getElementById('view-success'), login: document.getElementById('view-login'), dashboard: document.getElementById('view-dashboard') };
        const showView = (name) => { Object.keys(views).forEach(k => views[k].classList.add('hide')); views[name].classList.remove('hide'); };
        document.getElementById('nav-submit').onclick = () => showView('submit');
        document.getElementById('nav-admin').onclick = () => showView('login');

        // File Selection UI
        ['ppt', 'report', 'code'].forEach(k => {
            document.getElementById(`file-${k}`).onchange = function() {
                const label = document.getElementById(`label-${k}`);
                if (this.files[0]) label.classList.add('bg-blue-50', 'border-blue-500');
            };
        });

        // Upload Helper
        const uploadFile = (file, folder) => {
            return new Promise((resolve, reject) => {
                const path = `${folder}/${Date.now()}_${file.name}`;
                const storageRef = ref(storage, path);
                const uploadTask = uploadBytesResumable(storageRef, file);

                uploadTask.on('state_changed', 
                    (snapshot) => {
                        const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                        document.getElementById('progress-bar').style.width = progress + '%';
                    }, 
                    (error) => reject(error), 
                    () => { getDownloadURL(uploadTask.snapshot.ref).then((url) => resolve({ url, name: file.name })); }
                );
            });
        };

        // Submission
        document.getElementById('submission-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            const progress = document.getElementById('upload-progress');
            
            const title = document.getElementById('projectName').value.trim();
            const fPpt = document.getElementById('file-ppt').files[0];
            const fReport = document.getElementById('file-report').files[0];
            const fCode = document.getElementById('file-code').files[0];

            if (!fPpt || !fReport || !fCode) return alert("Select all files.");
            
            btn.disabled = true;
            progress.classList.remove('hide');

            try {
                await signInAnonymously(auth);
                const snap = await getDocs(query(collection(db, "submissions"), where("projectName", "==", title)));
                if (!snap.empty) { btn.disabled = false; return alert("Title already used."); }

                const ppt = await uploadFile(fPpt, 'ppt');
                const report = await uploadFile(fReport, 'reports');
                const code = await uploadFile(fCode, 'code');

                await addDoc(collection(db, "submissions"), {
                    studentName: nameInput.value, rollNo: rollInput.value, projectName: title,
                    githubLink: document.getElementById('githubLink').value,
                    pptUrl: ppt.url, pptName: ppt.name,
                    reportUrl: report.url, reportName: report.name,
                    codeUrl: code.url, codeName: code.name,
                    timestamp: new Date().toISOString()
                });
                showView('success');
            } catch (err) {
                alert("Upload error. Ensure Storage is enabled in Firebase.");
                btn.disabled = false;
            }
        };

        // Dashboard
        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            if (document.getElementById('admin-pass').value === ADMIN_PASS) showView('dashboard');
            else alert("Invalid Key");
        };

        onSnapshot(query(collection(db, "submissions")), (snap) => {
            submissions = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            document.getElementById('counter').innerText = `${submissions.length} Records Found`;
            const body = document.getElementById('table-body');
            body.innerHTML = submissions.map(s => `
                <tr class="hover:bg-slate-50">
                    <td class="px-10 py-6"><strong>${s.studentName}</strong><br><span class="text-[9px] text-slate-400 uppercase">${s.rollNo}</span></td>
                    <td class="px-10 py-6 font-bold text-slate-700">${s.projectName}</td>
                    <td class="px-10 py-6">
                        <div class="flex justify-center gap-2">
                            <a href="${s.pptUrl}" target="_blank" class="w-10 h-10 bg-slate-100 rounded flex items-center justify-center text-orange-600"><i class="fas fa-file-powerpoint"></i></a>
                            <a href="${s.reportUrl}" target="_blank" class="w-10 h-10 bg-slate-100 rounded flex items-center justify-center text-blue-600"><i class="fas fa-file-pdf"></i></a>
                            <a href="${s.codeUrl}" target="_blank" class="w-10 h-10 bg-slate-100 rounded flex items-center justify-center text-emerald-600"><i class="fas fa-file-code"></i></a>
                        </div>
                    </td>
                    <td class="px-10 py-6 text-right text-[10px] text-slate-400 font-bold">${new Date(s.timestamp).toLocaleDateString()}</td>
                </tr>
            `).join('');
        });
    </script>
</body>
</html>
